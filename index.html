<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Mon Espace DIGIY — HUB Partenaire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#022c22;          /* vert profond */
      --bg2:#065f46;         /* vert moyen */
      --card:#052e16;        /* carte sombre */
      --accent:#facc15;      /* or DIGIY */
      --accent-soft:rgba(250,204,21,0.12);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --danger:#f97373;
      --success:#22c55e;
      --border:rgba(148,163,184,0.40);
    }

    body{
      margin:0;
      padding:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top,#16a34a22 0,transparent 55%),
        linear-gradient(135deg,var(--bg),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"Manrope","Outfit",sans-serif;
      color:var(--text);
    }

    #digiy-hub-root{
      width:100%;
      max-width:520px;
    }

    .digiy-logo{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:18px;
    }
    .digiy-logo-icon{
      width:48px;
      height:48px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 0,#facc15 0,transparent 55%),
        radial-gradient(circle at bottom,#16a34a66 0,transparent 60%);
      border:1px solid rgba(250,204,21,0.7);
      display:flex;
      justify-content:center;
      align-items:center;
      color:#022c22;
      font-size:22px;
      font-weight:800;
      box-shadow:0 0 25px rgba(250,204,21,0.45);
    }
    .digiy-logo-text{
      font-weight:800;
      font-size:13px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:0.14em;
    }

    .digiy-card{
      background:
        linear-gradient(145deg,rgba(5,46,22,0.97),rgba(6,95,70,0.96));
      border-radius:24px;
      border:1px solid rgba(15,118,110,0.45);
      padding:22px 18px 20px;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.75),
        0 0 0 1px rgba(15,118,110,0.3);
      opacity:0;
      transform:translateY(10px);
      transition:0.28s ease-out;
    }
    .digiy-card.ready{
      opacity:1;
      transform:translateY(0);
    }

    h1{
      margin:0 0 6px;
      text-align:center;
      font-size:20px;
      text-transform:uppercase;
      font-weight:800;
      letter-spacing:0.08em;
    }
    .accent{
      color:var(--accent);
      text-shadow:0 0 18px rgba(250,204,21,0.55);
    }

    #headlineSub{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }

    .digiy-user-block{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(15,118,110,0.4);
      display:flex;
      gap:12px;
      margin-bottom:14px;
      backdrop-filter:blur(8px);
    }

    .digiy-avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 0,#facc15 0,transparent 55%),
        rgba(34,197,94,0.15);
      border:1px solid rgba(250,204,21,0.55);
      display:flex;
      justify-content:center;
      align-items:center;
      color:#022c22;
      font-weight:800;
      font-size:18px;
    }

    .digiy-user-name{
      font-size:15px;
      font-weight:700;
    }
    .digiy-user-email, .digiy-user-phone{
      font-size:12px;
      color:var(--muted);
    }

    .digiy-chip-row{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:6px;
    }
    .digiy-chip{
      font-size:11px;
      padding:3px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(148,163,184,0.4);
      color:var(--muted);
    }
    .digiy-chip-accent{
      color:var(--accent);
      border-color:var(--accent);
      background:var(--accent-soft);
    }

    .digiy-status-pill{
      margin-top:8px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.45);
      font-size:12px;
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(10px);
    }
    .digiy-status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
    }
    .digiy-dot-pre{
      background:#facc15;
    }
    .digiy-dot-active{
      background:#22c55e;
    }
    .digiy-dot-rejected{
      background:#f97373;
    }

    .digiy-section-title{
      margin-top:14px;
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:0.14em;
      margin-bottom:4px;
    }

    .digiy-info-box{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.05);
      border:1px dashed rgba(148,163,184,0.4);
      font-size:13px;
      line-height:1.5;
      backdrop-filter:blur(8px);
    }
    .digiy-info-box strong{
      color:var(--accent);
    }

    /* 🔔 Bloc d’alerte J-3 */
    .digiy-alert-box{
      margin-top:10px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(250,204,21,0.08);
      border:1px solid rgba(250,204,21,0.7);
      font-size:13px;
      line-height:1.4;
      color:#fef9c3;
      display:none;
    }
    .digiy-alert-title{
      font-weight:700;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      margin-bottom:4px;
    }

    #paymentPendingBox{
      margin-top:12px;
      display:none;
    }

    .digiy-status-line{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .digiy-modules-title{
      margin-top:18px;
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:0.14em;
    }

    .digiy-modules-grid{
      margin-top:8px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    @media(min-width:480px){
      .digiy-modules-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    .digiy-module-card{
      border-radius:16px;
      padding:12px;
      text-decoration:none;
      display:flex;
      flex-direction:column;
      gap:4px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(15,118,110,0.4);
      color:var(--text);
      cursor:pointer;
      transition:0.15s;
      backdrop-filter:blur(6px);
    }
    .digiy-module-card:hover{
      border-color:var(--accent);
      box-shadow:0 0 16px rgba(250,204,21,0.35);
    }
    .digiy-module-name{
      font-size:13px;
      font-weight:700;
    }
    .digiy-module-desc{
      font-size:12px;
      color:var(--muted);
    }
    .digiy-module-tag{
      font-size:10px;
      text-transform:uppercase;
      color:var(--accent);
    }

    .digiy-footer-row{
      margin-top:20px;
      font-size:11px;
      color:var(--muted);
      text-align:center;
    }

    .digiy-btn{
      margin-top:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.35);
      background:rgba(0,0,0,0.25);
      color:var(--muted);
      font-size:11px;
      letter-spacing:0.12em;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      backdrop-filter:blur(8px);
    }

    .digiy-loading{
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
      text-align:center;
    }
    .digiy-error{
      font-size:13px;
      color:var(--danger);
      margin-top:10px;
      text-align:center;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<div id="digiy-hub-root">
  <div class="digiy-logo">
    <div class="digiy-logo-icon">🦅</div>
    <div class="digiy-logo-text">MON ESPACE DIGIY</div>
  </div>

  <div class="digiy-card" id="hubCard">
    <h1><span class="accent">Mon espace</span> DIGIY</h1>
    <p id="headlineSub">Connexion à ton HUB…</p>

    <div id="loading" class="digiy-loading">Chargement…</div>
    <div id="error" class="digiy-error" style="display:none;"></div>

    <div id="content" style="display:none;">
      <div class="digiy-user-block">
        <div class="digiy-avatar" id="avatarInitial">?</div>
        <div>
          <div class="digiy-user-name" id="userName"></div>
          <div class="digiy-user-email" id="userEmail"></div>
          <div class="digiy-user-phone" id="userPhone"></div>

          <div class="digiy-chip-row" id="modulesRow"></div>

          <div class="digiy-status-pill">
            <div class="digiy-status-dot" id="statusDot"></div>
            <span id="statusLabel">—</span>
          </div>
        </div>
      </div>

      <div class="digiy-section-title">Résumé</div>
      <div class="digiy-info-box" id="infoBox"></div>

      <!-- 🔔 Bloc alerte J-3 -->
      <div id="alertBox" class="digiy-alert-box">
        <div class="digiy-alert-title">ALERTE ABONNEMENT</div>
        <div id="alertMessage"></div>
        <button class="digiy-btn" id="payWaveBtn" style="margin-top:8px;">
          💸 PAYER AVEC WAVE
        </button>
      </div>

      <div id="paymentPendingBox" class="digiy-info-box">
        🔄 <strong>Paiement en attente</strong><br>
        Merci d’envoyer ton paiement Wave au :<br>
        <strong style="color:var(--accent);">+221 77 134 2889</strong>
      </div>

      <div id="statusLine" class="digiy-status-line"></div>

      <div id="modulesActiveSection" style="display:none;">
        <div class="digiy-modules-title">Modules actifs</div>
        <div class="digiy-modules-grid" id="modulesActiveGrid"></div>
      </div>

      <div class="digiy-footer-row">
        <button class="digiy-btn" id="logoutBtn">⏏ SE DÉCONNECTER</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";

  const INSCRIPTION_URL = "https://beauville.github.io/inscription-digiy/";
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // État courant du PRO pour les actions
  let currentProId = null;
  let currentActiveModules = [];

  const hubCard        = document.getElementById("hubCard");
  const loadingEl      = document.getElementById("loading");
  const errorEl        = document.getElementById("error");
  const contentEl      = document.getElementById("content");
  const headlineSub    = document.getElementById("headlineSub");

  const avatarInitial  = document.getElementById("avatarInitial");
  const userNameEl     = document.getElementById("userName");
  const userEmailEl    = document.getElementById("userEmail");
  const userPhoneEl    = document.getElementById("userPhone");
  const modulesRow     = document.getElementById("modulesRow");
  const statusDot      = document.getElementById("statusDot");
  const statusLabel    = document.getElementById("statusLabel");
  const infoBox        = document.getElementById("infoBox");
  const statusLine     = document.getElementById("statusLine");
  const paymentPendingBox  = document.getElementById("paymentPendingBox");
  const logoutBtn      = document.getElementById("logoutBtn");

  const modulesActiveSection = document.getElementById("modulesActiveSection");
  const modulesActiveGrid    = document.getElementById("modulesActiveGrid");

  const alertBox       = document.getElementById("alertBox");
  const alertMessageEl = document.getElementById("alertMessage");
  const payWaveBtn     = document.getElementById("payWaveBtn");

  function setError(msg){
    loadingEl.style.display = "none";
    errorEl.style.display   = "block";
    errorEl.textContent     = msg;
    contentEl.style.display = "none";
    hubCard.classList.add("ready");
  }

  function buildModulesChips(preferred, modules){
    const chips = [];
    if(preferred){
      chips.push('<span class="digiy-chip digiy-chip-accent">'+ preferred.toUpperCase() +'</span>');
    }
    if(Array.isArray(modules)){
      modules.forEach(m => {
        if(m && m.toLowerCase() !== (preferred || "").toLowerCase()){
          chips.push('<span class="digiy-chip">'+ m.toUpperCase() +'</span>');
        }
      });
    }
    if(!chips.length){
      chips.push('<span class="digiy-chip">Aucun module actif</span>');
    }
    return chips.join("");
  }

  function renderActiveModules(modules){
    modulesActiveGrid.innerHTML = "";
    const list = Array.isArray(modules) ? modules : [];

    const catalog = {
      driver: {
        label: "🚗 DIGIY DRIVER",
        desc:  "Gestion chauffeurs & courses 0% commission.",
        url:   "https://beauville.github.io/digiy-chauffeur/"
      },
      loc: {
        label: "🏠 DIGIY LOC",
        desc:  "Hébergements, maisons, résidences.",
        url:   "https://beauville.github.io/chez-baptiste-digiy-loc/"
      },
      resto: {
        label: "🍽️ DIGIY RESTO",
        desc:  "Gestion restaurant & commandes.",
        url:   "#"
      },
      market: {
        label: "🏪 DIGIY MARKET",
        desc:  "Marketplace produits & services.",
        url:   "#"
      },
      jobs: {
        label: "💼 DIGIY JOBS",
        desc:  "Jobs & services terrain.",
        url:   "#"
      }
    };

    if(!list.length){
      modulesActiveSection.style.display = "none";
      return;
    }

    list.forEach(key => {
      const k    = (key || "").toString().toLowerCase();
      const meta = catalog[k];
      if(!meta) return;
      const card = document.createElement("a");
      card.href   = meta.url || "#";
      card.target = meta.url && meta.url.startsWith("http") ? "_blank" : "_self";
      card.className = "digiy-module-card";
      card.innerHTML = `
        <div class="digiy-module-name">${meta.label}</div>
        <div class="digiy-module-desc">${meta.desc}</div>
        <div class="digiy-module-tag">ouvrir</div>
      `;
      modulesActiveGrid.appendChild(card);
    });
  }

  async function initHub(){
    try{
      // 1) Vérifier session Supabase
      const { data: userData, error: userError } = await client.auth.getUser();
      if(userError || !userData || !userData.user){
        window.location.href = INSCRIPTION_URL;
        return;
      }

      const user  = userData.user;
      const email = user.email || "";
      userEmailEl.textContent = email || "email inconnu";

      const nameFromMeta = (user.user_metadata && user.user_metadata.full_name) || "";
      const initialSource = nameFromMeta || email;
      const initial = initialSource ? initialSource.trim().charAt(0).toUpperCase() : "D";
      avatarInitial.textContent = initial;

      // 2) Récupérer automatiquement le PRO lié à cet utilisateur
      const { data: proId, error: proErr } = await client.rpc("get_my_pro_id");
      if(proErr || !proId){
        setError("Aucun compte partenaire DIGIY lié à cet email.");
        return;
      }
      currentProId = proId;

      // 3) Charger les infos du PRO depuis la table pros
      const { data: proRow, error: proSelectErr } = await client
        .from("pros")
        .select("full_name, phone, status, payment_status, activated_at, expires_at, active_modules")
        .eq("id", proId)
        .single();

      if(proSelectErr || !proRow){
        console.error(proSelectErr);
        setError("Impossible de charger ton compte partenaire DIGIY.");
        return;
      }

      const fullName = proRow.full_name || "Abonné DIGIY";
      userNameEl.textContent = fullName;

      const phone = proRow.phone || "";
      userPhoneEl.textContent = phone ? "📞 " + phone : "";

      // 4) Charger les modules actifs via RPC
      const { data: modulesData, error: modErr } = await client.rpc(
        "get_hub_modules",
        { pro_uuid: proId }
      );

      if(modErr){
        console.error(modErr);
        setError("Impossible de charger tes modules DIGIY.");
        return;
      }

      const activeCodes = Array.isArray(modulesData)
        ? modulesData.map(m => (m.module_code || "").toLowerCase())
        : [];

      currentActiveModules = activeCodes;
      modulesRow.innerHTML = buildModulesChips(activeCodes[0], activeCodes);

      const status = proRow.status || "pending";
      const paymentStatus = proRow.payment_status || "pending";
      const isActive = status === "active" && paymentStatus === "paid";

      if(isActive){
        statusDot.className = "digiy-status-dot digiy-dot-active";
        statusLabel.textContent = "Compte actif";
        headlineSub.textContent = "Ton HUB DIGIY est actif";
        infoBox.innerHTML = "Ton compte partenaire DIGIY est <strong>actif</strong>. Accède directement à tes modules ci-dessous.";
        paymentPendingBox.style.display = "none";
      } else {
        statusDot.className = "digiy-status-dot digiy-dot-pre";
        statusLabel.textContent = "Activation en cours";
        headlineSub.textContent = "Statut de ton dossier : activation en cours";
        infoBox.innerHTML = "Ta fiche partenaire est enregistrée. Valide ou finalise ton paiement pour activer ton HUB DIGIY.";
        paymentPendingBox.style.display = "block";
      }

      let statusTextLine = "";
      if(proRow.activated_at){
        const act = new Date(proRow.activated_at);
        statusTextLine += "Activé le " + act.toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
      }
      if(proRow.expires_at){
        const exp = new Date(proRow.expires_at);
        if(statusTextLine) statusTextLine += " • ";
        statusTextLine += "Expire le " + exp.toLocaleDateString("fr-FR");
      }
      statusLine.textContent = statusTextLine;

      if(activeCodes.length){
        modulesActiveSection.style.display = "block";
        renderActiveModules(activeCodes);
      } else {
        modulesActiveSection.style.display = "none";
      }

      // 🔔 5) Charger la dernière notification pour ce PRO (ex: J-3)
      const { data: notifRows, error: notifErr } = await client
        .from("notifications")
        .select("type, message, created_at, sent")
        .eq("pro_id", proId)
        .order("created_at", { ascending:false })
        .limit(1);

      if(!notifErr && Array.isArray(notifRows) && notifRows.length > 0){
        const n = notifRows[0];
        alertBox.style.display = "block";
        alertMessageEl.textContent = n.message || "Ton abonnement DIGIY arrive à échéance. Pense à renouveler pour éviter la coupure.";
      } else {
        alertBox.style.display = "none";
      }

      loadingEl.style.display = "none";
      contentEl.style.display = "block";
      hubCard.classList.add("ready");
    } catch(err){
      console.error(err);
      setError("Erreur inattendue lors du chargement du HUB.");
    }
  }

  // 💸 Bouton PAYER AVEC WAVE
  if (payWaveBtn) {
    payWaveBtn.addEventListener("click", () => {
      if (!currentProId) {
        alert("Impossible d’afficher les infos paiement pour l’instant.");
        return;
      }

      const ref = "DIGIY-" + currentProId.substring(0,8).toUpperCase();

      alert(
        "💸 PAIEMENT WAVE\n\n" +
        "1️⃣ Envoie le montant exact à :\n" +
        "+221 77 134 28 89\n\n" +
        "2️⃣ Mets cette référence dans le message :\n" +
        ref + "\n\n" +
        "3️⃣ Une fois le paiement reçu, ton abonnement sera activé par l’équipe DIGIY."
      );
    });
  }

  logoutBtn.addEventListener("click", async () => {
    try{
      await client.auth.signOut();
    } catch(e){
      console.error(e);
    } finally{
      window.location.href = INSCRIPTION_URL;
    }
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initHub);
  } else {
    initHub();
  }
</script>
</body>
</html>
